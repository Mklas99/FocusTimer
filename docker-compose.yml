services:
  sonarqube:
    image: sonarqube:lts
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
    environment:
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
  scanner:
    image: sonarsource/sonar-scanner-cli:latest
    volumes:
      - ./:/usr/src
    working_dir: /usr/src
    command: ["sh", "-c", "until curl -sSf http://sonarqube:9000 >/dev/null 2>&1; do echo 'waiting for sonarqube'; sleep 2; done; sonar-scanner -Dsonar.host.url=http://sonarqube:9000 -Dsonar.login=${SONAR_TOKEN}"]

volumes:
  sonarqube_data:
  sonarqube_extensions:
