name: SonarQube Cloud

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  sonar:
    name: Build, test, coverage, analyze
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      MANUAL_SONAR_ANALYSIS: ${{ secrets.MANUAL_SONAR_ANALYSIS }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install SonarScanner for .NET
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Restore
        run: dotnet restore FocusTimer.sln

      - name: Begin Sonar analysis
        if: env.MANUAL_SONAR_ANALYSIS == 'true'
        run: >
          dotnet sonarscanner begin
          /k:"Mklas99_FocusTimer"
          /o:"mklas99"
          /d:sonar.token="${SONAR_TOKEN}"
          /d:sonar.cs.opencover.reportsPaths="**/TestResults/*.coverage.opencover.xml"

      - name: Skip manual Sonar analysis (Automatic Analysis likely enabled)
        if: env.MANUAL_SONAR_ANALYSIS != 'true'
        run: |
          echo "MANUAL_SONAR_ANALYSIS is not 'true' — skipping dotnet sonarscanner begin/end to avoid duplicate analysis with SonarCloud Automatic Analysis."

      - name: Build
        run: dotnet build FocusTimer.sln -c Release --no-restore

      - name: Test with coverage (per-project)
        run: |
          mkdir -p TestResults
          set -e
          for proj in $(find tests -name "*.csproj"); do
            name=$(basename "$proj" .csproj)
            echo "Running tests for $name"
            dotnet test "$proj" -c Release --no-build \
              /p:CollectCoverage=true \
              /p:CoverletOutputFormat=opencover \
              /p:CoverletOutput=./TestResults/${name}.coverage.opencover.xml
          done

      - name: End Sonar analysis
        if: env.MANUAL_SONAR_ANALYSIS == 'true'
        run: dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"
